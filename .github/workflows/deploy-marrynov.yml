name: Deploy — Site MARRYNOV

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/marrynov/**'
      - 'packages/**'
      - '.github/workflows/deploy-marrynov.yml'

concurrency:
  group: deploy-marrynov-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/marrynov-site

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/marrynov/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-to: type=inline

  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Set deploy variables
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "app_id=${{ secrets.DOKPLOY_APP_ID_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "app_id=${{ secrets.DOKPLOY_APP_ID_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Update image tag
        run: |
          curl -sf -X POST "${{ secrets.DOKPLOY_URL }}/api/trpc/application.update" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -d '{
              "json": {
                "applicationId": "${{ steps.vars.outputs.app_id }}",
                "dockerImage": "${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
              }
            }'

      - name: Trigger deploy
        run: |
          curl -sf -X POST "${{ secrets.DOKPLOY_URL }}/api/trpc/application.deploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -d '{"json": {"applicationId": "${{ steps.vars.outputs.app_id }}"}}'

      - name: Wait for deployment
        run: |
          echo "Deployment triggered for ${{ github.ref_name }} → app ${{ steps.vars.outputs.app_id }}"
          echo "Image: ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
