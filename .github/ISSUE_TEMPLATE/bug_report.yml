name: Rapport de bug
description: Signaler un comportement inattendu ou une erreur
title: "fix: [DESCRIPTION COURTE]"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire pour aider à reproduire et corriger le bug.

  - type: dropdown
    id: projet
    attributes:
      label: Projet concerné
      options:
        - template-pizza
        - template-coiffure
        - template-restaurant
        - template-location-voiture
        - site-marrynov
        - packages/ui
        - packages/database
        - Autre
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Décris clairement ce qui se passe.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur la page '...'
        2. Cliquer sur '...'
        3. Observer l'erreur
    validations:
      required: true

  - type: textarea
    id: attendu
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: environnement
    attributes:
      label: Environnement
      placeholder: |
        - OS: Windows 11 / WSL2 Ubuntu
        - Node: 20.x
        - Navigateur: Chrome 120
    validations:
      required: false

  - type: textarea
    id: contexte
    attributes:
      label: Contexte supplémentaire (logs, captures d'écran)
    validations:
      required: false
